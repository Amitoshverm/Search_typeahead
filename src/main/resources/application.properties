spring.application.name=bookmark_application
server.port=${PORT:9090}
server.error.include-stacktrace=never
logging.level.org.springframework.security=TRACE
spring.output.ansi.enabled=ALWAYS

## db config for Railway
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

## JPA config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

## JWT config
jwt.secret=${JWT_SECRET:mysecretkey}
jwt.expiration=86400000

## Redis config for Railway
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}

## CORS (update FRONTEND_URL after Vercel deploy)
cors.allowed-origin=${CORS_ORIGIN:http://localhost:3000}