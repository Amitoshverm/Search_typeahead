spring.application.name=bookmark_application
server.port=${PORT:9090}
server.error.include-stacktrace=never
logging.level.org.springframework.security=TRACE
spring.output.ansi.enabled=ALWAYS

## db config - Using Railway's exact variable names
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

## JPA config
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

## JWT config
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

## Redis config
spring.data.redis.host=${REDISHOST}
spring.data.redis.port=${REDISPORT}
spring.data.redis.password=${REDISPASSWORD}
spring.data.redis.username=default

## CORS
cors.allowed-origin=${CORS_ORIGIN:http://localhost:3000}