spring.application.name=bookmark_application
server.port=${PORT:9090}
server.error.include-stacktrace=never
logging.level.org.springframework.security=TRACE
spring.output.ansi.enabled=ALWAYS

## db config
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

## JPA config – remove explicit dialect to let Hibernate auto-detect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# No spring.jpa.database-platform or hibernate.dialect lines

## JWT config
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

## Redis config for Upstash
spring.data.redis.host=exciting-monkey-122145.upstash.io
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl=true
spring.data.redis.timeout=5000ms

## CORS
cors.allowed-origin=${CORS_ORIGIN:http://localhost:3000}